<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jungle Hallway Runner</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f1a12;
            font-family: Georgia, 'Times New Roman', serif;
        }

        canvas {
            display: block;
        }

        #hud {
            position: fixed;
            left: 16px;
            top: 16px;
            z-index: 10;
            color: #f7f1da;
            background: rgba(8, 18, 11, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 14px;
            padding: 12px 14px;
            max-width: 390px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(6px);
        }

        #hud h1 {
            margin: 0 0 6px 0;
            font-size: 18px;
            letter-spacing: 0.03em;
        }

        #hud .line {
            font-size: 13px;
            line-height: 1.4;
            margin-top: 4px;
        }

        #hud .status {
            margin-top: 8px;
            font-weight: 700;
            color: #ffe18d;
        }
    </style>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.3.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quaternion@1.5.1/quaternion.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/numeric@1.2.6/numeric-1.2.6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
    <script type="importmap">
        {
            "imports": {
              "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
              "three/": "https://unpkg.com/three@0.160.0/"
            }
        }
    </script>
</head>
<body>
<div id="hud">
    <h1>Jungle Hallway Runner</h1>
    <div class="line">Arrow keys move the character through the hallway. Space jumps, and X spins to break crates and defeat crabs.</div>
    <div class="line">Jump while moving forward to trigger a front flip.</div>
    <div class="status" id="status">Loading...</div>
</div>
<script type="module" src="./js/crash_platformer.js"></script>
</body>
</html>
